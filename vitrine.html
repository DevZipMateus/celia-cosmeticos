<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demonstração de Vitrine — Célia Produtos de Beleza</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#C96B7A">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/favicon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --rosa:        #C96B7A;
      --rosa-vivo:   #B8566A;
      --rosa-palido: #FDF6F8;
      --dourado:     #C9A25A;
      --azul:        #1C3557;
      --azul-medio:  #2A4A7F;
      --branco:      #FFFFFF;
      --texto:       #2D2D2D;
      --texto-leve:  #777777;
      --borda:       #EDE0E3;
      --header-h:    80px;
      --badge-h:     63px;
      --ff-titulo:   'Cormorant Garamond', serif;
      --ff-corpo:    'Lato', sans-serif;
      --tr:          0.3s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    html::-webkit-scrollbar { display: none; }

    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }
    img { display: block; max-width: 100%; }

    .container {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* ══════════════════════════════════
       HEADER
    ══════════════════════════════════ */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      height: var(--header-h);
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--borda);
      box-shadow: 0 2px 16px rgba(201,107,122,0.1);
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 100%;
    }
    .logo-wrap img { height: 58px; width: auto; }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .nav-links a {
      font-family: var(--ff-corpo);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--texto-leve);
      transition: color var(--tr);
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0; right: 0;
      height: 1px;
      background: var(--rosa);
      transform: scaleX(0);
      transition: transform var(--tr);
    }
    .nav-links a:hover { color: var(--rosa); }
    .nav-links a:hover::after { transform: scaleX(1); }
    .nav-links a.active-page { color: var(--rosa); }
    .nav-links a.active-page::after { transform: scaleX(1); }

    .nav-cta {
      background: var(--rosa) !important;
      color: var(--branco) !important;
      padding: 0.5rem 1.4rem;
      border-radius: 100px;
      border: 2px solid var(--rosa);
      font-size: 0.78rem !important;
      letter-spacing: 1.5px;
    }
    .nav-cta::after { display: none !important; }
    .nav-cta:hover {
      background: var(--rosa-vivo) !important;
      border-color: var(--rosa-vivo) !important;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 2px;
      background: var(--texto);
      border-radius: 2px;
      transition: all var(--tr);
    }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

    /* nav mobile */
    #navMenu {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(12px);
      z-index: 999;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, padding 0.3s ease;
      border-bottom: 1px solid var(--borda);
    }
    #navMenu.open { max-height: 480px; padding: 20px 0 28px; }
    #navMenu a {
      display: block;
      font-family: var(--ff-corpo);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--texto-leve);
      padding: 14px 24px;
      border-bottom: 1px solid var(--borda);
      transition: color var(--tr), background var(--tr);
    }
    #navMenu a:hover { color: var(--rosa); background: var(--rosa-palido); }
    #navMenu .nav-cta {
      display: block;
      margin: 16px 24px 0;
      text-align: center;
      border-radius: 100px;
      padding: 14px 24px !important;
    }

    /* ══════════════════════════════════
       IFRAME VITRINE
    ══════════════════════════════════ */
    #vitrine-wrapper {
      position: fixed;
      top: var(--header-h);
      left: 0;
      right: 0;
      bottom: var(--badge-h);
      width: 100%;
    }
    #vitrine-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ══════════════════════════════════
       BADGE INFERIOR
    ══════════════════════════════════ */
    #vitrine-badge {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--badge-h);
      background: linear-gradient(135deg, var(--azul) 0%, var(--azul-medio) 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      z-index: 1000;
      border-top: 2px solid var(--rosa);
      gap: 12px;
    }
    .badge-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--ff-corpo);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--branco);
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 100px;
      padding: 0.45rem 1.2rem;
      white-space: nowrap;
      transition: background var(--tr), border-color var(--tr);
    }
    .badge-back:hover {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.55);
    }
    .badge-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      justify-content: center;
    }
    .badge-brand img {
      height: 32px;
      filter: brightness(0) invert(1);
      opacity: 0.85;
    }
    .badge-brand span {
      font-family: var(--ff-corpo);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      white-space: nowrap;
    }
    .badge-wa {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--ff-corpo);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--branco);
      background: #25D366;
      border: 1px solid #25D366;
      border-radius: 100px;
      padding: 0.45rem 1.2rem;
      white-space: nowrap;
      transition: background var(--tr);
    }
    .badge-wa:hover { background: #1da851; border-color: #1da851; }

    /* ══════════════════════════════════
       RESPONSIVIDADE
    ══════════════════════════════════ */
    @media (max-width: 1023px) {
      nav .nav-links { display: none; }
      .hamburger { display: flex; }
    }
    @media (max-width: 767px) {
      :root { --header-h: 66px; }
      .logo-wrap img { height: 48px; }
      .badge-brand span { display: none; }
      .badge-brand img { height: 26px; }
      .badge-back span { display: none; }
    }
    @media (max-width: 599px) {
      #vitrine-badge { padding: 0 1rem; }
      .badge-back { padding: 0.4rem 0.9rem; font-size: 0.68rem; }
      .badge-wa { padding: 0.4rem 0.9rem; font-size: 0.68rem; }
    }
    @media (max-width: 479px) {
      :root { --header-h: 60px; }
      .badge-brand { display: none; }
    }
    @media (max-width: 360px) {
      .logo-wrap img { height: 40px; }
    }
  </style>
</head>
<body>

  <!-- ══════ HEADER ══════ -->
  <header id="header">
    <div class="container header-inner">
      <a href="index.html" class="logo-wrap" aria-label="Célia Produtos de Beleza — início">
        <img src="images/logo.png" alt="Célia Produtos de Beleza" loading="eager">
      </a>
      <nav class="nav-links" aria-label="Navegação principal">
        <a href="index.html#sobre">Sobre</a>
        <a href="index.html#produtos">Produtos</a>
        <a href="vitrine.html" class="active-page">Vitrine</a>
        <a href="index.html#faq">FAQ</a>
        <a href="index.html#contato">Contato</a>
        <a href="https://wa.me/5519988279540" target="_blank" rel="noopener noreferrer" class="nav-cta">
          <i class="fa-brands fa-whatsapp"></i> WhatsApp
        </a>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="Abrir menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- nav mobile -->
  <nav id="navMenu" aria-label="Menu mobile">
    <a href="index.html#sobre">Sobre</a>
    <a href="index.html#produtos">Produtos</a>
    <a href="vitrine.html" style="color:var(--rosa)">Vitrine</a>
    <a href="index.html#faq">FAQ</a>
    <a href="index.html#contato">Contato</a>
    <a href="https://wa.me/5519988279540" target="_blank" rel="noopener noreferrer" class="nav-cta">
      <i class="fa-brands fa-whatsapp"></i> Falar no WhatsApp
    </a>
  </nav>

  <!-- ══════ IFRAME VITRINE ══════ -->
  <div id="vitrine-wrapper">
    <iframe
      id="vitrine-frame"
      src="https://celiaprodutosbeleza.egestor.com.br/vitrine/"
      title="Vitrine Célia Produtos de Beleza"
      allow="payment"
      loading="eager">
    </iframe>
  </div>

  <!-- ══════ BADGE INFERIOR ══════ -->
  <div id="vitrine-badge">
    <a href="index.html" class="badge-back">
      <i class="fa-solid fa-arrow-left"></i>
      <span>Voltar ao site</span>
    </a>
    <div class="badge-brand">
      <img src="images/logo.png" alt="Célia Produtos de Beleza">
      <span>Vitrine Oficial</span>
    </div>
    <a href="https://wa.me/5519988279540" target="_blank" rel="noopener noreferrer" class="badge-wa">
      <i class="fa-brands fa-whatsapp"></i> WhatsApp
    </a>
  </div>

  <script>
    /* ── HAMBURGER ── */
    const hamburger = document.getElementById('hamburger');
    const navMenu   = document.getElementById('navMenu');
    hamburger.addEventListener('click', () => {
      const open = navMenu.classList.toggle('open');
      hamburger.classList.toggle('open', open);
      hamburger.setAttribute('aria-expanded', open);
    });
    navMenu.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        navMenu.classList.remove('open');
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
      });
    });
  </script>
</body>
</html>
